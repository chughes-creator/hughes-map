const buildRegionMap = (jurisdictions) => {
  const map = {};
  for (const j of jurisdictions) {
    for (const region of j.regions) {
      map[region] = j;
    }
  }
  return map;
};

// ⚠ EDIT THIS URL — Point to the raw content of your GitHub Gist.
//   To get the raw URL: open your Gist → click "Raw" on the jurisdictions.json
//   file → copy the URL from the browser. It should end in /raw/<hash>/jurisdictions.json
//   Tip: Use the *unpinned* raw URL (without the commit hash) if you want updates
//   to propagate automatically. Note: GitHub caches raw URLs for ~5 minutes.
const REMOTE_DATA_URL = 'https://gist.githubusercontent.com/YOUR_USERNAME/YOUR_GIST_ID/raw/jurisdictions.json';

// Validates a single jurisdiction object has the required fields.
// If remote data is malformed, we silently drop it and keep the fallback.
const isValidJurisdiction = (j) => (
  j &&
  typeof j.id === 'string' &&
  typeof j.name === 'string' &&
  typeof j.jurisdiction === 'string' &&
  (j.scope === 'us-state' || j.scope === 'country') &&
  Array.isArray(j.regions) &&
  ['active', 'imminent', 'proposed'].includes(j.status) &&
  typeof j.enforcementDate === 'string' &&
  typeof j.auditRequirement === 'string' &&
  typeof j.forensicNote === 'string'
);

function JurisdictionalMap() {
  const [selectedJurisdiction, setSelectedJurisdiction] = useState(null);
  const [hoveredId, setHoveredId] = useState(null);
  const [activeFilter, setActiveFilter] = useState('all');
  const [view, setView] = useState('world');
  const [isMobile, setIsMobile] = useState(false);

  // Data state — starts with the hardcoded fallback, gets replaced by remote data if fetch succeeds
  const [jurisdictions, setJurisdictions] = useState(FALLBACK_JURISDICTIONS);
  const [dataSource, setDataSource] = useState('fallback'); // 'fallback' | 'remote'
  const [lastUpdated, setLastUpdated] = useState(null);

  // Fetch remote data on mount. Silently falls back to hardcoded data on any failure.
  useEffect(() => {
    // Skip fetch if the placeholder URL hasn't been replaced
    if (REMOTE_DATA_URL.includes('YOUR_USERNAME') || REMOTE_DATA_URL.includes('YOUR_GIST_ID')) {
      return;
    }
    let cancelled = false;
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 8000); // 8s safety timeout

    fetch(REMOTE_DATA_URL, { signal: controller.signal, cache: 'no-store' })
      .then((res) => {
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.json();
      })
      .then((data) => {
        if (cancelled) return;
        // Accept either an array or an object with a .jurisdictions property
        const arr = Array.isArray(data) ? data : data.jurisdictions;
        if (!Array.isArray(arr)) throw new Error('Invalid structure');
        // Filter to only valid entries — bad records get silently dropped
        const valid = arr.filter(isValidJurisdiction);
        if (valid.length === 0) throw new Error('No valid jurisdictions in remote data');
        setJurisdictions(valid);
        setDataSource('remote');
        setLastUpdated(new Date());
      })
      .catch((err) => {
        // Any failure → stay on fallback. Log for debugging but don't surface to users.
        console.warn('[Hughes AI Audit] Remote data fetch failed, using fallback:', err.message);
      })
      .finally(() => {
        clearTimeout(timeout);
      });

    return () => {
      cancelled = true;
      controller.abort();
      clearTimeout(timeout);
    };
  }, []);

  useEffect(() => {
    const check = () => setIsMobile(window.innerWidth < 900);
    check();
    window.addEventListener('resize', check);
    return () => window.removeEventListener('resize', check);
  }, []);

  const filteredJurisdictions = useMemo(
    () => (activeFilter === 'all' ? jurisdictions : jurisdictions.filter((j) => j.status === activeFilter)),
    [activeFilter, jurisdictions]
  );

  const stats = useMemo(
    () => ({
      active: jurisdictions.filter((j) => j.status === 'active').length,
      imminent: jurisdictions.filter((j) => j.status === 'imminent').length,
      proposed: jurisdictions.filter((j) => j.status === 'proposed').length,
    }),
    [jurisdictions]
  );

  return (
    <div
      className="min-h-screen bg-[#eef2f7] text-[#0f1f3d] flex flex-col"
      style={{ fontFamily: '"Instrument Serif", Georgia, "Times New Roman", serif' }}
    >
      {/* ════ HEADER ════ */}
      <header className="border-b border-slate-300 bg-white sticky top-0 z-20">
        <div className="px-4 md:px-8 py-4 md:py-5">
          <div className="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
            <div className="flex items-center gap-3">
              <img
                src="logo.png"
                alt="Hughes AI Audit"
                className="w-11 h-11 flex-shrink-0 object-contain"
                onError={(e) => { e.target.style.display = 'none'; }}
              />

              <div>
                <h1
                  className="text-xl md:text-[26px] text-[#0f1f3d] leading-tight"
                  style={{ fontFamily: '"Instrument Serif", Georgia, "Times New Roman", serif', letterSpacing: '-0.01em' }}
                >
                  Hughes AI Audit
                  <span className="text-[#1a4d8f]/40 mx-2 font-thin">│</span>
                  <span className="italic text-[#1a4d8f]" style={{ fontWeight: 400 }}>
                    Jurisdictional Intelligence Portal
                  </span>
                </h1>
                <p className="text-[10px] md:text-[11px] uppercase tracking-[0.22em] text-slate-500 font-mono mt-1">
                  Forensic Regulatory Tracking · Updated Q2 2026
                </p>
              </div>
            </div>

            <div className="hidden md:flex items-center gap-5 text-[10px] uppercase tracking-[0.15em] font-mono">
              <div className="flex items-center gap-2">
                <div className="w-2 h-2 rounded-sm" style={{ backgroundColor: COLORS.red }} />
                <span className="text-slate-500">Active</span>
                <span className="font-bold tabular-nums" style={{ color: '#b86060' }}>{stats.active}</span>
              </div>
              <div className="flex items-center gap-2">
                <div className="w-2 h-2 rounded-sm" style={{ backgroundColor: COLORS.yellow }} />
                <span className="text-slate-500">Imminent</span>
                <span className="font-bold tabular-nums" style={{ color: '#b8824a' }}>{stats.imminent}</span>
              </div>
              <div className="flex items-center gap-2">
                <div className="w-2 h-2 rounded-sm" style={{ backgroundColor: COLORS.blue }} />
                <span className="text-slate-500">Proposed</span>
                <span className="font-bold tabular-nums" style={{ color: '#5a85c0' }}>{stats.proposed}</span>
              </div>
            </div>
          </div>
        </div>
      </header>

      {/* ════ MAIN ════ */}
      <div className="flex-1 flex flex-col lg:flex-row overflow-hidden">
        {/* ── MAP REGION ── */}
        <div className="flex-1 lg:w-3/5 lg:flex-none relative border-b lg:border-b-0 lg:border-r border-slate-300 flex flex-col min-h-[500px] bg-white">
          {/* Control bar */}
          <div className="px-4 md:px-6 py-4 border-b border-slate-200 bg-white">
            <div className="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-3">
              <div>
                <div className="flex items-center gap-2 mb-2">
                  <Filter className="w-3.5 h-3.5 text-slate-500" strokeWidth={2} />
                  <span className="text-[10px] uppercase tracking-[0.22em] text-slate-500 font-mono font-semibold">
                    Filter by Status
                  </span>
                </div>
                <Legend activeFilter={activeFilter} setActiveFilter={setActiveFilter} jurisdictions={jurisdictions} />
              </div>
              <ViewToggle view={view} setView={setView} />
            </div>
          </div>

          {/* Map canvas */}
          <div className="flex-1 relative bg-[#eef2f7] overflow-hidden">
            <div className="absolute inset-0 p-3 md:p-5">
              {view === 'world' ? (
                <WorldMap
                  filteredJurisdictions={filteredJurisdictions}
                  selectedId={selectedJurisdiction?.id}
                  hoveredId={hoveredId}
                  onHover={setHoveredId}
                  onLeave={() => setHoveredId(null)}
                  onSelect={setSelectedJurisdiction}
                />
              ) : (
                <USMap
                  filteredJurisdictions={filteredJurisdictions}
                  selectedId={selectedJurisdiction?.id}
                  hoveredId={hoveredId}
                  onHover={setHoveredId}
                  onLeave={() => setHoveredId(null)}
                  onSelect={setSelectedJurisdiction}
                />
              )}
            </div>

            {/* Corner annotations */}
            <div className="absolute top-3 left-3 md:top-5 md:left-5 text-[9px] uppercase tracking-[0.15em] text-slate-400 font-mono pointer-events-none">
              <div className="text-[#1a4d8f]/60">◆ {view === 'world' ? 'MERCATOR · WGS84' : 'ALBERS USA'}</div>
              <div className="text-slate-400 mt-0.5">
                {view === 'world' ? 'NATURAL EARTH 110M' : 'US CENSUS BUREAU'}
              </div>
            </div>
            <div className="absolute top-3 right-3 md:top-5 md:right-5 text-right text-[9px] uppercase tracking-[0.15em] text-slate-400 font-mono pointer-events-none">
              <div>{jurisdictions.length} JURISDICTIONS TRACKED</div>
              <div className="text-slate-400 mt-0.5">
                {dataSource === 'remote' && lastUpdated
                  ? `LIVE · UPDATED ${lastUpdated.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }).toUpperCase()}`
                  : 'CACHED FEED'}
              </div>
            </div>

            {/* Hover tooltip */}
            {hoveredId && (() => {
              const hovered = jurisdictions.find((j) => j.id === hoveredId);
              if (!hovered) return null;
              const status = STATUS_CONFIG[hovered.status];
              return (
                <div
                  className="absolute bottom-3 right-3 md:bottom-5 md:right-5 bg-white border rounded-sm px-3 py-2 shadow-lg pointer-events-none max-w-[260px]"
                  style={{ borderColor: status.color }}
                >
                  <div
                    className="text-[9px] uppercase tracking-[0.15em] font-mono font-semibold mb-1"
                    style={{ color: status.color }}
                  >
                    {status.fullLabel}
                  </div>
                  <div
                    className="text-sm text-[#0f1f3d] leading-tight"
                    style={{ fontFamily: '"Instrument Serif", Georgia, serif' }}
                  >
                    {hovered.name}
                  </div>
                  <div className="text-[10px] text-slate-500 font-mono uppercase tracking-wider mt-1">
                    {hovered.jurisdiction}
                  </div>
                </div>
              );
            })()}
          </div>
        </div>

        {/* ── DETAIL PANEL (Desktop) ── */}
        {!isMobile && (
          <div className="lg:w-2/5 lg:flex-none relative min-h-[500px]">
            <DetailPanel jurisdiction={selectedJurisdiction} onClose={() => setSelectedJurisdiction(null)} isMobile={false} />
          </div>
        )}

        {/* ── DETAIL PANEL (Mobile drawer) ── */}
        {isMobile && selectedJurisdiction && (
          <>
            <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-30" onClick={() => setSelectedJurisdiction(null)} />
            <div
              className="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-300 z-40 rounded-t-xl"
              style={{ maxHeight: '85vh', animation: 'slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1)' }}
            >
              <div className="flex justify-center pt-3 pb-1">
                <div className="w-10 h-1 bg-slate-300 rounded-full" />
              </div>
              <div className="max-h-[80vh] overflow-hidden">
                <DetailPanel jurisdiction={selectedJurisdiction} onClose={() => setSelectedJurisdiction(null)} isMobile={true} />
              </div>
            </div>
          </>
        )}
      </div>

      {/* ════ FOOTER ════ */}
      <footer className="border-t border-slate-300 px-4 md:px-8 py-3 bg-white">
        <div className="flex flex-col md:flex-row md:items-center md:justify-between gap-2 text-[10px] uppercase tracking-[0.15em] font-mono text-slate-500">
          <span>
            © 2026 HUGHES AI AUDIT · <span className="text-[#1a4d8f]">HUGHESAUDIT.AI</span>
          </span>
          <span className="text-slate-400 hidden md:inline">
            NOTE: JANUARY 2026 FEDERAL EO PENDING RULEMAKING · INFORMATIONAL USE ONLY
          </span>
        </div>
      </footer>

      <style>{`
        @keyframes slideUp {
          from { transform: translateY(100%); }
          to { transform: translateY(0); }
        }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(26, 77, 143, 0.25); border-radius: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: rgba(26, 77, 143, 0.5); }
      `}</style>
    </div>
  );
}



// Mount to the DOM
const container = document.getElementById('hughes-map-root');
const root = ReactDOM.createRoot(container);
root.render(<JurisdictionalMap />);

</script>

</body>
</html>
